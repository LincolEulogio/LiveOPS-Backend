# SRS (Simple Realtime Server) configuration for LiveOPS
# Docs: https://ossrs.net/lts/zh-cn/docs/v5/doc/getting-started

listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;
srs_log_level       warn;

http_api {
    enabled         on;
    listen          1985;
}

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

stats {
    network         0;
    disk            sda sdb xvda xvdb;
}

vhost __defaultVhost__ {
    # ── HLS output (browser / CDN playback) ──────────────────────────────────
    hls {
        enabled         on;
        hls_path        ./objs/nginx/html;
        hls_fragment    2;      # 2-second segments — low-latency HLS
        hls_window      10;     # keep 10 segments (~20s window)
    }

    # ── Low-Latency HTTP-FLV (optional web player) ────────────────────────────
    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
    }

    # ── RTMP publish settings ─────────────────────────────────────────────────
    publish {
        mr          off;    # disable merged read — reduces latency
    }

    # ── on_publish callback → NestJS (cleans up hub on disconnect) ────────────
    # In Docker compose: NestJS runs as 'backend' on port 4000.
    # For local dev without Docker: change host to host.docker.internal or localhost.
    on_publish {
        enabled     on;
        mount       http://backend:4000/api/v1/streaming/srs/on-publish;
    }
    on_unpublish {
        enabled     on;
        mount       http://backend:4000/api/v1/streaming/srs/on-unpublish;
    }
}
